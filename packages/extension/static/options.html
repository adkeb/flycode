<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>FlyCode 扩展设置</title>
    <style>
      :root {
        --bg: #f7f8fb;
        --fg: #1f2a37;
        --muted: #5f6b7a;
        --card: #ffffff;
        --line: #d8deea;
        --accent: #1f6feb;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      .wrap {
        max-width: 820px;
        margin: 28px auto;
        padding: 0 18px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 18px;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0 0 10px;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      .row {
        margin-bottom: 10px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }
      input[type="text"],
      input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px 10px;
        background: #fff;
      }
      .hint {
        color: var(--muted);
        font-size: 12px;
        margin: 2px 0 0;
      }
      .btns {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 12px;
        background: #fff;
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .status {
        min-height: 22px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>FlyCode 扩展设置（消息采集模式）</h1>

      <section class="card">
        <h2>连接参数</h2>
        <div class="row">
          <label for="appBaseUrl">FlyCode Desktop 服务地址</label>
          <input id="appBaseUrl" type="text" placeholder="http://127.0.0.1:39393" />
        </div>
        <div class="row">
          <label for="bridgeFrontDedupeLimit">采集前置去重上限/会话</label>
          <input id="bridgeFrontDedupeLimit" type="number" min="200" max="20000" />
        </div>
        <div class="row">
          <label for="bridgeOutboundQueueLimit">断线待发队列上限</label>
          <input id="bridgeOutboundQueueLimit" type="number" min="20" max="1000" />
        </div>
        <div class="row">
          <label for="bridgePingIntervalMs">心跳间隔(ms)</label>
          <input id="bridgePingIntervalMs" type="number" min="2000" max="120000" />
        </div>
        <div class="row">
          <label><input id="debugLoggingEnabled" type="checkbox" /> 启用调试日志</label>
        </div>
        <div class="btns">
          <button class="primary" id="saveBtn">保存设置</button>
          <button id="checkBtn">检测应用连接</button>
          <button id="reloadBtn">重载 Qwen/DeepSeek 页面</button>
        </div>
        <p class="hint">扩展只负责采集网页消息并回传应用，不再执行 MCP、站点密钥、自动工具、文件/目录注入功能。</p>
      </section>

      <section class="card">
        <div id="status" class="status"></div>
      </section>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
